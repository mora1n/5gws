# 默认接近 5gpn：
# - CN 域名走国内 DNS pool。
# - Speedtest/Ookla 域名返回 gateway_ip，再由通用 TCP gateway 从服务端出口发起。
# - GFW 域名对内网客户端返回 gateway_ip，再进入 HAProxy/quicgw。
# - 常见 STUN 域名返回 gateway_ip；默认 UDP/443 reject，促使客户端回落到可嗅探的 TCP 路径。

[[rules]]
name = "ip-check"
exit = "direct"
domain_suffix = [
  "icanhazip.com",
  "ipinfo.io",
  "ippure.com",
]

[[rules]]
name = "ippure-stun"
exit = "direct"
domain = [
  "stun.chat.bilibili.com",
  "stun.cloudflare.com",
  "stun.hitv.com",
  "stun.l.google.com",
  "stun.miwifi.com",
]

[[imports]]
name = "speedtest"
type = "sing-box"
url = "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/category-speedtest.json"
exit = "direct"

[[imports]]
name = "cn"
type = "sing-box"
url = "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/cn.json"
dns_pool = "cn"

[[imports]]
name = "gfw"
type = "sing-box"
url = "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/gfw.json"
exit = "direct"

[[imports]]
name = "ip-geo-detect"
type = "sing-box"
url = "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/category-ip-geo-detect.json"
exit = "direct"

[[imports]]
name = "stun"
type = "sing-box"
url = "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/category-stun.json"
exit = "direct"

# 如果要额外把某些域名送到 shadowsocks-rust 出口：
# 1. 先在 config.toml 中配置同名 [[exits]]。
# 2. 再取消下面注释。
#
# [[rules]]
# name = "openai"
# exit = "ss1"
# domain_suffix = ["openai.com", "chatgpt.com"]
