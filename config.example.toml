[network]
gateway_ip = "10.0.0.1"
internal_cidr = "172.22.0.0/16"
ingress_iface = "eth0"
# tcp_redirect_port = 18082
# quic_policy = "reject" # reject | proxy

[routing]
fallback_exit = "direct"

# 默认通过 network.tcp_redirect_port 提供通用 TCP gateway，不再按 Speedtest 端口内置代理。
# 如需兼容历史端口代理或显式接管某个 TCP 端口，可取消注释。
# [[tcp_proxies]]
# name = "speedtest-8080"
# client_port = 8080
# listen_port = 18081
# exit = "direct"

# 默认 quic_policy = "reject"，不内置 STUN UDP proxy。
# 如需显式接管某个 UDP 端口，可取消注释。
# [[udp_proxies]]
# name = "stun-3478"
# client_port = 3478
# listen_port = 13478
# target = "stun.cloudflare.com:3478"
# exit = "direct"

[dns]
dot_domain = "dot.example.com"
cert_file = "/etc/5gws/certs/fullchain.pem"
key_file = "/etc/5gws/certs/privkey.pem"
backend_resolvers = ["1.1.1.1:53", "1.0.0.1:53", "8.8.8.8:53", "8.8.4.4:53", "9.9.9.9:53", "22.22.22.22:53"]

[logging]
level = "info"
access = true

[ios]
enabled = true
listen = "0.0.0.0:8088"
base_url = "http://10.0.0.1:8088"
organization = "5gws"
profile_identifier = "dev.5gws.dot"

[[exits]]
name = "direct"
type = "direct"

# 如需 shadowsocks-rust 出口，取消下面注释并填写真实参数。
# password 生成示例：openssl rand -base64 16
