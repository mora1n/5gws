[network]
gateway_ip = "10.0.0.1"
internal_cidr = "172.22.0.0/16"
ingress_iface = "eth0"

[routing]
fallback_exit = "direct"

# 默认内置两个 Speedtest TCP proxy：
# tcp/8080 -> 127.0.0.1:18081 -> 原始目标:8080
# tcp/5060 -> 127.0.0.1:15060 -> 原始目标:5060
# 如需覆盖默认值，取消注释并填写完整列表。
# [[tcp_proxies]]
# name = "speedtest-8080"
# client_port = 8080
# listen_port = 18081
# exit = "direct"
#
# [[tcp_proxies]]
# name = "speedtest-5060"
# client_port = 5060
# listen_port = 15060
# exit = "direct"

# 默认内置两个 STUN UDP proxy：
# udp/3478 -> 127.0.0.1:13478 -> stun.cloudflare.com:3478
# udp/19302 -> 127.0.0.1:13902 -> stun.l.google.com:19302
# 如需覆盖默认值，取消注释并填写完整列表。
# [[udp_proxies]]
# name = "stun-3478"
# client_port = 3478
# listen_port = 13478
# target = "stun.cloudflare.com:3478"
# exit = "direct"
#
# [[udp_proxies]]
# name = "stun-19302"
# client_port = 19302
# listen_port = 13902
# target = "stun.l.google.com:19302"
# exit = "direct"

[dns]
dot_domain = "dot.example.com"
cert_file = "/etc/5gws/certs/fullchain.pem"
key_file = "/etc/5gws/certs/privkey.pem"
backend_resolvers = ["1.1.1.1:53", "1.0.0.1:53", "8.8.8.8:53", "8.8.4.4:53", "9.9.9.9:53", "22.22.22.22:53"]

[logging]
level = "info"
access = true

[ios]
enabled = true
listen = "0.0.0.0:8088"
base_url = "http://10.0.0.1:8088"
organization = "5gws"
profile_identifier = "dev.5gws.dot"

[[exits]]
name = "direct"
type = "direct"

